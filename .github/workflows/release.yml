name: Release

# 推送 tag 时触发自动打包并发布到 GitHub Releases
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          # refs/tags/v1.0.1 -> 1.0.1
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish (self-contained)
        env:
          CI: "true"
        run: >
          dotnet publish MYUBrowser/MYUBrowser.csproj
          -c Release -r win-x64 --self-contained true
          -o publish

      - name: Velopack pack
        run: >
          vpk pack
          --packId MYUBrowser
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish
          --mainExe MYUBrowser.exe
          --packTitle "MYU Browser"
          --outputDir releases

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --publish
          --releaseName "MYU Browser ${{ steps.ver.outputs.version }}"
          --tag ${{ steps.ver.outputs.tag }}
          --outputDir releases
          --token ${{ secrets.GITHUB_TOKEN }}
